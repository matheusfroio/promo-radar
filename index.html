<style>
  :root {
    --bg: #FFFFFF;
    --surface: #F7F8FA;
    --accent: #FF6900;
    --accent-dark: #E05A00;
    --text-primary: #1A1A1A;
    --text-secondary: #6B7280;
    --border: #E5E7EB;
    --red: #E11D48;
    --green: #16A34A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  a { color: inherit; }

  :focus-visible {
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }

  /* ---------- HEADER ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }

  .logo span { color: var(--accent); }

  /* ---------- SOCIAL BAR ---------- */
  .social-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .social-link {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.15s;
  }

  .social-link:hover,
  .social-link:focus-visible {
    color: var(--accent);
  }

  .social-link svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  /* ---------- MAIN CONTAINER ---------- */
  main {
    flex: 1;
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px;
  }

  /* ---------- SEARCH ---------- */
  .search-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: var(--text-secondary);
    pointer-events: none;
  }

  #busca {
    width: 100%;
    padding: 13px 14px 13px 42px;
    font-size: 1rem;
    font-family: inherit;
    color: var(--text-primary);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  #busca:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,105,0,0.12);
    outline: none;
  }

  #busca::placeholder { color: var(--text-secondary); }

  /* ---------- FILTERS ---------- */
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 12px;
    scrollbar-width: thin;
  }

  .filters::-webkit-scrollbar { height: 4px; }
  .filters::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .pill {
    flex-shrink: 0;
    font-family: inherit;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text-primary);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .pill:hover { border-color: var(--accent); }

  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #FFFFFF;
  }

  /* ---------- SORT ---------- */
  .sort-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .sort-label {
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 500;
    margin-right: 2px;
  }

  .sort-btn {
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-secondary);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .sort-btn.active {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(255,105,0,0.06);
  }

  /* ---------- GRID ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  @media (min-width: 640px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
  }

  @media (min-width: 1024px) {
    .grid { grid-template-columns: repeat(4, 1fr); gap: 18px; }
  }

  /* ---------- CARD ---------- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.15s, transform 0.15s;
  }

  .card:hover {
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }

  .card-media {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #FFFFFF;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card-media img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .card-media .emoji-fallback {
    font-size: 3.2rem;
    line-height: 1;
  }

  .badge {
    position: absolute;
    font-size: 0.7rem;
    font-weight: 800;
    color: #FFFFFF;
    border-radius: 6px;
    padding: 4px 8px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .badge-discount {
    top: 8px;
    left: 8px;
    background: var(--red);
  }

  .badge-new {
    top: 8px;
    right: 8px;
    background: var(--green);
  }

  .card-body {
    padding: 10px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .card-title {
    font-size: 0.875rem;
    font-weight: 600;
    line-height: 1.35;
    color: var(--text-primary);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 2.4em;
  }

  .price-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 2px;
  }

  .price-original {
    font-size: 0.8rem;
    color: var(--text-secondary);
    text-decoration: line-through;
  }

  .price-current {
    font-size: 1.35rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.01em;
  }

  .cta-btn {
    display: block;
    width: 100%;
    text-align: center;
    background: var(--accent);
    color: #FFFFFF;
    font-weight: 700;
    font-size: 0.875rem;
    text-decoration: none;
    border-radius: 10px;
    padding: 11px 10px;
    margin-top: 6px;
    transition: background 0.15s;
  }

  .cta-btn:hover { background: var(--accent-dark); }

  .timestamp {
    font-size: 0.72rem;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  /* ---------- EMPTY STATE ---------- */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }

  .empty-state .icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
  }

  .empty-state p {
    font-size: 1rem;
    font-weight: 500;
  }

  /* ---------- FOOTER ---------- */
  footer {
    border-top: 1px solid var(--border);
    padding: 18px 16px;
    text-align: center;
  }

  footer p {
    font-size: 0.75rem;
    color: var(--text-secondary);
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.5;
  }
</style>
</head>

<footer>
  <p>Este site contém links de afiliado. Ao comprar, você apoia este canal sem pagar nada a mais.</p>
</footer>

<script>
  const EMOJI_CATEGORIA = {
    'Eletrônicos': '📱',
    'Moda': '👕',
    'Casa': '🏠',
    'Esporte': '⚽',
    'Beleza': '💄',
    'Geral': '🛍️'
  };

  const PREPOSICAO_LOJA = {
    'Mercado Livre': 'no',
    'Shopee': 'na'
  };

  const state = {
    categoria: 'Todos',
    busca: '',
    ordenacao: 'recentes'
  };

  function lerProdutos() {
    const raw = document.querySelectorAll('#produtos-raw .produto');
    const produtos = [];
    raw.forEach(el => {
      produtos.push({
        titulo: el.dataset.titulo || '',
        link: el.dataset.link || '#',
        preco: parseFloat(el.dataset.preco) || 0,
        precoOriginal: parseFloat(el.dataset.precoOriginal) || 0,
        desconto: parseInt(el.dataset.desconto) || 0,
        categoria: el.dataset.categoria || 'Geral',
        imagem: el.dataset.imagem || '',
        loja: el.dataset.loja || 'Mercado Livre',
        timestamp: el.dataset.timestamp || new Date().toISOString()
      });
    });
    return produtos;
  }

  function formatarPreco(valor) {
    return valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function tempoRelativo(timestamp) {
    const diffMs = Date.now() - new Date(timestamp).getTime();
    const minutos = Math.floor(diffMs / 60000);
    if (minutos < 1) return 'agora mesmo';
    if (minutos < 60) return `há ${minutos} min`;
    const horas = Math.floor(minutos / 60);
    if (horas < 24) return `há ${horas}h`;
    const dias = Math.floor(horas / 24);
    return `há ${dias}d`;
  }

  function ehNovo(timestamp) {
    const diffMs = Date.now() - new Date(timestamp).getTime();
    return diffMs <= 2 * 60 * 60 * 1000;
  }

  function criarCard(produto) {
    const emoji = EMOJI_CATEGORIA[produto.categoria] || EMOJI_CATEGORIA['Geral'];

    const media = produto.imagem
      ? `<img src="${escapeHtml(produto.imagem)}" alt="${escapeHtml(produto.titulo)}" loading="lazy"
           onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'emoji-fallback',textContent:'${emoji}'}))">`
      : `<div class="emoji-fallback">${emoji}</div>`;

    const badgeDesconto = produto.desconto > 0
      ? `<span class="badge badge-discount">-${produto.desconto}%</span>` : '';

    const badgeNovo = ehNovo(produto.timestamp)
      ? `<span class="badge badge-new">Novo</span>` : '';

    const precoOriginal = produto.precoOriginal > 0
      ? `<span class="price-original">R$ ${formatarPreco(produto.precoOriginal)}</span>` : '';

    const preposicaoLoja = PREPOSICAO_LOJA[produto.loja] || PREPOSICAO_LOJA['Mercado Livre'];

    return `
      <article class="card">
        <div class="card-media">
          ${media}
          ${badgeDesconto}
          ${badgeNovo}
        </div>
        <div class="card-body">
          <h3 class="card-title">${escapeHtml(produto.titulo)}</h3>
          <div class="price-row">
            ${precoOriginal}
            <span class="price-current">R$ ${formatarPreco(produto.preco)}</span>
          </div>
          <a class="cta-btn" href="${escapeHtml(produto.link)}" target="_blank" rel="noopener sponsored">Ver oferta ${preposicaoLoja} ${escapeHtml(produto.loja)} →</a>
          <span class="timestamp">${tempoRelativo(produto.timestamp)}</span>
        </div>
      </article>
    `;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function render() {
    const grid = document.getElementById('grid');
    let produtos = lerProdutos();

    if (produtos.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="icon">🛍️</div>
          <p>Nenhum produto encontrado. Volte em breve! 🛍️</p>
        </div>`;
      return;
    }

    if (state.categoria !== 'Todos') {
      produtos = produtos.filter(p => p.categoria === state.categoria);
    }

    if (state.busca.trim() !== '') {
      const termo = state.busca.trim().toLowerCase();
      produtos = produtos.filter(p => p.titulo.toLowerCase().includes(termo));
    }

    if (state.ordenacao === 'recentes') {
      produtos.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    } else if (state.ordenacao === 'desconto') {
      produtos.sort((a, b) => b.desconto - a.desconto);
    }

    if (produtos.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="icon">🔍</div>
          <p>Nenhum resultado para sua busca.</p>
        </div>`;
      return;
    }

    grid.innerHTML = produtos.map(criarCard).join('');
  }

  document.getElementById('busca').addEventListener('input', e => {
    state.busca = e.target.value;
    render();
  });

  document.getElementById('filtros').addEventListener('click', e => {
    const btn = e.target.closest('.pill');
    if (!btn) return;
    document.querySelectorAll('#filtros .pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    state.categoria = btn.dataset.categoria;
    render();
  });

  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.ordenacao = btn.dataset.sort;
      render();
    });
  });

  render();

  // Atualiza os "há X min" e badges "Novo" periodicamente
  setInterval(render, 60000);
</script>
